<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Styling Exercises</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>DOM Selection & Styling</h1>

        <!-- Task 1: Color Switcher -->
        <section id="color-section">
            <h2>1. Background Color Switcher</h2>
            <button id="btn-red">Make Red</button>
            <button id="btn-blue">Make Blue</button>
            <button id="btn-reset">Reset</button>
        </section>

        <hr>

        <!-- Task 2: Font Resizer -->
        <section id="font-section">
            <h2>2. Text Resizer</h2>
            <p id="text-to-resize">I am the text that changes size!</p>
            <button id="btn-bigger">Bigger</button>
            <button id="btn-smaller">Smaller</button>
        </section>

        <hr>

        <!-- Task 3: Theme Toggle -->
        <section id="theme-section">
            <h2>3. Dark Mode Toggle</h2>
            <p>Toggle the class 'dark-mode' on the container.</p>
            <button id="btn-toggle-theme">Toggle Dark Mode</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
